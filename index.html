<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DebtBoard - Bi-monthly Settlement</title>
    
    <!-- PWA Meta Tags & Assets -->
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#111827">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans selection:bg-blue-200">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, updateDoc, doc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const { useState, useEffect, useRef } = React;

        // --- SVG Icons (Replacing lucide-react for standalone HTML compatibility) ---
        const IconSvg = ({ children, size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                {children}
            </svg>
        );
        const Plus = (p) => <IconSvg {...p}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></IconSvg>;
        const Calendar = (p) => <IconSvg {...p}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></IconSvg>;
        const CreditCard = (p) => <IconSvg {...p}><rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect><line x1="1" y1="10" x2="23" y2="10"></line></IconSvg>;
        const TrendingUp = (p) => <IconSvg {...p}><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></IconSvg>;
        const CheckCircle2 = (p) => <IconSvg {...p}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></IconSvg>;
        const X = (p) => <IconSvg {...p}><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></IconSvg>;
        const Bell = (p) => <IconSvg {...p}><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></IconSvg>;
        const Wallet = (p) => <IconSvg {...p}><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"></path><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"></path><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"></path></IconSvg>;
        const FastForward = (p) => <IconSvg {...p}><polygon points="13 19 22 12 13 5 13 19"></polygon><polygon points="2 19 11 12 2 5 2 19"></polygon></IconSvg>;
        const RotateCcw = (p) => <IconSvg {...p}><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></IconSvg>;
        const Landmark = (p) => <IconSvg {...p}><line x1="3" y1="22" x2="21" y2="22"></line><line x1="6" y1="18" x2="6" y2="11"></line><line x1="10" y1="18" x2="10" y2="11"></line><line x1="14" y1="18" x2="14" y2="11"></line><line x1="18" y1="18" x2="18" y2="11"></line><polygon points="12 2 20 7 4 7"></polygon></IconSvg>;
        const Circle = (p) => <IconSvg {...p}><circle cx="12" cy="12" r="10"></circle></IconSvg>;
        const Edit2 = (p) => <IconSvg {...p}><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></IconSvg>;
        const Archive = (p) => <IconSvg {...p}><polyline points="21 8 21 21 3 21 3 8"></polyline><rect x="1" y="3" width="22" height="5"></rect><line x1="10" y1="12" x2="14" y2="12"></line></IconSvg>;

        // --- Helper Functions ---
        const getCurrentMonthStr = () => {
          const now = new Date();
          return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
        };

        const addMonthsStr = (monthStr, count) => {
          let [year, month] = monthStr.split('-').map(Number);
          month += count;
          while (month > 12) { month -= 12; year++; }
          while (month < 1) { month += 12; year--; }
          return `${year}-${String(month).padStart(2, '0')}`;
        };

        const formatMonthStr = (monthStr) => {
          const [year, month] = monthStr.split('-').map(Number);
          const date = new Date(year, month - 1);
          return date.toLocaleString('default', { month: 'long', year: 'numeric' });
        };

        const getSettlementDate = (dueDate) => {
          if (dueDate >= 15 && dueDate <= 29) return 14;
          return 29;
        };

        const getUpcomingBatch = () => {
          const today = new Date().getDate();
          return today <= 14 ? 14 : 29;
        };

        // --- Firebase Configuration ---
        const firebaseConfig = {
          apiKey: "AIzaSyDoeWb3w1vJs6hoexIetSiAqQU1wXhX1tM",
          authDomain: "trainx-49d0e.firebaseapp.com",
          projectId: "trainx-49d0e",
          storageBucket: "trainx-49d0e.firebasestorage.app",
          messagingSenderId: "905714923468",
          appId: "1:905714923468:web:5218d3c8b379dae8238f69"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = firebaseConfig.appId;

        // --- Main App Component ---
        function App() {
          const [user, setUser] = useState(null);
          const [items, setItems] = useState([]);
          const [isAddModalOpen, setIsAddModalOpen] = useState(false);
          const [editingItem, setEditingItem] = useState(null);
          const [selectedItemId, setSelectedItemId] = useState(null);
          const [toast, setToast] = useState({ visible: false, message: '' });
          const [upcomingBatch] = useState(getUpcomingBatch());

          useEffect(() => {
            const initAuth = async () => {
              try {
                await signInAnonymously(auth);
              } catch (error) {
                console.error("Authentication failed:", error);
              }
            };
            initAuth();
            
            const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
              setUser(currentUser);
              if (currentUser) {
                console.log("Firebase Auth Success! User ID:", currentUser.uid);
              }
            });
            return () => unsubscribe();
          }, []);

          useEffect(() => {
            if (!user) return;
            const collectionPath = collection(db, 'artifacts', appId, 'users', user.uid, 'obligations');
            const q = query(collectionPath);
            
            const unsubscribe = onSnapshot(q, (snapshot) => {
              const fetchedItems = snapshot.docs.map(doc => ({
                id: doc.id,
                ...doc.data()
              }));
              setItems(fetchedItems);
            }, (error) => {
              console.error("Error fetching data:", error);
              showToast("Error loading database");
            });

            return () => unsubscribe();
          }, [user]);

          const showToast = (message) => {
            setToast({ visible: true, message });
            setTimeout(() => {
              setToast({ visible: false, message: '' });
            }, 3000);
          };

          const handleAddItem = async (newItem) => {
            if (!user) {
              showToast("Connecting to database... please try again.");
              return;
            }
            const settlementDate = getSettlementDate(Number(newItem.originalDueDate));
            
            const item = {
              name: newItem.name,
              type: newItem.type,
              amount: Number(newItem.amount),
              originalDueDate: Number(newItem.originalDueDate),
              settlementDate,
              nextPaymentMonth: getCurrentMonthStr(),
              status: 'active',
              ...(newItem.type === 'installment' && {
                currentInstallment: Number(newItem.currentInstallment),
                totalInstallments: Number(newItem.totalInstallments)
              })
            };
            
            try {
              const collectionPath = collection(db, 'artifacts', appId, 'users', user.uid, 'obligations');
              await addDoc(collectionPath, item);
              setIsAddModalOpen(false);
              showToast(`${item.name} added to the ${settlementDate}th batch!`);
            } catch (error) {
              console.error("Error adding document: ", error);
              showToast("Failed to add obligation.");
            }
          };

          const handleUpdateItem = async (updatedData) => {
            if (!user) {
              showToast("Connecting to database... please try again.");
              return;
            }
            if (!editingItem) return;
            const settlementDate = getSettlementDate(Number(updatedData.originalDueDate));
            const itemRef = doc(db, 'artifacts', appId, 'users', user.uid, 'obligations', editingItem.id);
            
            try {
              await updateDoc(itemRef, {
                name: updatedData.name,
                type: updatedData.type,
                amount: Number(updatedData.amount),
                originalDueDate: Number(updatedData.originalDueDate),
                settlementDate,
                ...(updatedData.type === 'installment' && {
                  currentInstallment: Number(updatedData.currentInstallment),
                  totalInstallments: Number(updatedData.totalInstallments)
                })
              });
              setEditingItem(null);
              showToast(`${updatedData.name} updated successfully!`);
            } catch (error) {
              console.error("Error updating document: ", error);
              showToast("Failed to update obligation.");
            }
          };

          const handlePay = async (id) => {
            if (!user) {
              showToast("Connecting to database... please try again.");
              return;
            }
            const item = items.find(i => i.id === id);
            if (!item) return;

            const itemRef = doc(db, 'artifacts', appId, 'users', user.uid, 'obligations', id);
            const nextMonth = addMonthsStr(item.nextPaymentMonth || getCurrentMonthStr(), 1);

            try {
              if (item.type === 'installment') {
                const newCurrent = (item.currentInstallment || 1) + 1;
                const isCompleted = newCurrent > item.totalInstallments;
                
                if (isCompleted) {
                  await updateDoc(itemRef, { status: 'completed', nextPaymentMonth: nextMonth });
                  showToast(`🎉 ${item.name} fully paid off!`);
                } else {
                  await updateDoc(itemRef, { currentInstallment: newCurrent, nextPaymentMonth: nextMonth });
                  showToast(`Payment logged for ${item.name}.`);
                }
              } else {
                await updateDoc(itemRef, { nextPaymentMonth: nextMonth });
                showToast(`${item.name} payment logged!`);
              }
            } catch (error) {
              console.error("Error updating document: ", error);
              showToast("Failed to update status.");
            }
          };

          const handleUndo = async (id) => {
            if (!user) {
              showToast("Connecting to database... please try again.");
              return;
            }
            const item = items.find(i => i.id === id);
            if (!item) return;

            const itemRef = doc(db, 'artifacts', appId, 'users', user.uid, 'obligations', id);
            const prevMonth = addMonthsStr(item.nextPaymentMonth || getCurrentMonthStr(), -1);

            try {
              if (item.type === 'installment') {
                const newCurrent = Math.max(1, (item.currentInstallment || 2) - 1);
                await updateDoc(itemRef, { currentInstallment: newCurrent, nextPaymentMonth: prevMonth, status: 'active' });
              } else {
                await updateDoc(itemRef, { nextPaymentMonth: prevMonth });
              }
              showToast(`Reverted last payment for ${item.name}.`);
            } catch (error) {
              console.error("Error undoing document: ", error);
              showToast("Failed to undo.");
            }
          };

          const currentMonthStr = getCurrentMonthStr();
          const activeItems = items.filter(item => item.status === 'active');
          const completedItems = items.filter(item => item.status === 'completed');
          const batch14 = activeItems.filter(item => item.settlementDate === 14);
          const batch29 = activeItems.filter(item => item.settlementDate === 29);

          const calculateBatchTotal = (batch) => 
            batch
              .filter(item => (item.nextPaymentMonth || currentMonthStr) <= currentMonthStr)
              .reduce((sum, item) => sum + item.amount, 0);

          const total14 = calculateBatchTotal(batch14);
          const total29 = calculateBatchTotal(batch29);

          const totalRemainingDebt = activeItems.reduce((sum, item) => {
            if (item.type === 'installment') {
              const remainingInst = item.totalInstallments - (item.currentInstallment || 1) + 1;
              return sum + (item.amount * remainingInst);
            } else {
              const isPaid = (item.nextPaymentMonth || currentMonthStr) > currentMonthStr;
              return sum + (isPaid ? 0 : item.amount);
            }
          }, 0);

          return (
            <div className="max-w-md mx-auto bg-white min-h-screen shadow-sm relative pb-24">
              <header className="px-6 pt-12 pb-4 bg-white sticky top-0 z-10 border-b border-gray-100 flex justify-between items-center">
                <div>
                  <h1 className="text-2xl font-bold tracking-tight text-gray-900">DebtBoard</h1>
                  <p className="text-sm text-gray-500">Bi-monthly automated settlement</p>
                </div>
              </header>

              <main className="px-6 py-6 space-y-8">
                <section>
                  <div className="bg-gray-900 rounded-2xl p-5 text-white shadow-md flex items-center justify-between">
                    <div>
                      <p className="text-gray-400 text-sm font-medium mb-1">Total Remaining Debt</p>
                      <h2 className="text-3xl font-bold">₱{totalRemainingDebt.toLocaleString()}</h2>
                    </div>
                    <div className="bg-gray-800 p-3 rounded-full">
                      <Landmark size={24} className="text-blue-400" />
                    </div>
                  </div>
                </section>

                <section>
                  <h2 className="text-lg font-semibold mb-4 flex items-center">
                    <Wallet className="mr-2 text-blue-600" size={20} /> 
                    Due This Cycle
                  </h2>
                  <div className="grid grid-cols-2 gap-4">
                    <div className={`p-4 rounded-2xl border ${upcomingBatch === 14 ? 'bg-blue-50 border-blue-200' : 'bg-white border-gray-200'}`}>
                      <div className="flex justify-between items-start mb-2">
                        <span className={`text-xs font-bold px-2 py-1 rounded-md ${upcomingBatch === 14 ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-600'}`}>
                          14th
                        </span>
                        {upcomingBatch === 14 && <div className="w-2 h-2 rounded-full bg-blue-600 animate-pulse" />}
                      </div>
                      <p className="text-sm text-gray-500 mt-2">Due Amount</p>
                      <p className="text-2xl font-bold mt-1 text-gray-900">₱{total14.toLocaleString()}</p>
                    </div>

                    <div className={`p-4 rounded-2xl border ${upcomingBatch === 29 ? 'bg-blue-50 border-blue-200' : 'bg-white border-gray-200'}`}>
                      <div className="flex justify-between items-start mb-2">
                        <span className={`text-xs font-bold px-2 py-1 rounded-md ${upcomingBatch === 29 ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-600'}`}>
                          29th
                        </span>
                        {upcomingBatch === 29 && <div className="w-2 h-2 rounded-full bg-blue-600 animate-pulse" />}
                      </div>
                      <p className="text-sm text-gray-500 mt-2">Due Amount</p>
                      <p className="text-2xl font-bold mt-1 text-gray-900">₱{total29.toLocaleString()}</p>
                    </div>
                  </div>
                </section>

                <section className="space-y-6">
                  <div>
                    <h3 className="text-sm font-bold text-gray-400 uppercase tracking-wider mb-3">Pay on the 14th</h3>
                    <div className="space-y-3">
                      {batch14.length === 0 ? (
                        <p className="text-sm text-gray-400 italic bg-gray-50 p-4 rounded-xl border border-dashed">No obligations for this batch.</p>
                      ) : (
                        batch14.map(item => <ObligationCard key={item.id} item={item} onPay={handlePay} onUndo={handleUndo} currentMonthStr={currentMonthStr} onSelect={setSelectedItemId} onEdit={setEditingItem} />)
                      )}
                    </div>
                  </div>

                  <div>
                    <h3 className="text-sm font-bold text-gray-400 uppercase tracking-wider mb-3">Pay on the 29th</h3>
                    <div className="space-y-3">
                      {batch29.length === 0 ? (
                        <p className="text-sm text-gray-400 italic bg-gray-50 p-4 rounded-xl border border-dashed">No obligations for this batch.</p>
                      ) : (
                        batch29.map(item => <ObligationCard key={item.id} item={item} onPay={handlePay} onUndo={handleUndo} currentMonthStr={currentMonthStr} onSelect={setSelectedItemId} onEdit={setEditingItem} />)
                      )}
                    </div>
                  </div>
                  
                  {completedItems.length > 0 && (
                    <div className="pt-6 mt-6 border-t border-gray-200">
                      <h3 className="text-sm font-bold text-gray-400 uppercase tracking-wider mb-3 flex items-center">
                        <Archive size={16} className="mr-2" />
                        Completed / Archived
                      </h3>
                      <div className="space-y-3 opacity-70">
                        {completedItems.map(item => (
                          <div key={item.id} className="p-4 rounded-2xl border bg-gray-50 border-gray-200 flex justify-between items-center">
                            <div className="flex items-center space-x-3">
                              <div className="p-2 bg-green-100 text-green-600 rounded-xl"><CheckCircle2 size={20} /></div>
                              <div>
                                <h4 className="font-semibold text-gray-500 line-through">{item.name}</h4>
                                <p className="text-xs text-gray-400">Fully Paid</p>
                              </div>
                            </div>
                            <button onClick={() => handleUndo(item.id)} className="p-2 text-gray-500 hover:text-gray-700 active:scale-95 transition-all" title="Undo completion">
                              <RotateCcw size={18} />
                            </button>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                </section>
              </main>

              <button
                onClick={() => setIsAddModalOpen(true)}
                className="fixed bottom-8 right-1/2 transform translate-x-1/2 md:translate-x-0 md:right-8 lg:right-[calc(50%-13rem)] bg-blue-600 text-white p-4 rounded-full shadow-lg hover:bg-blue-700 active:scale-95 transition-all flex items-center justify-center"
                aria-label="Add new obligation"
              >
                <Plus size={24} />
              </button>

              {isAddModalOpen && (
                <ObligationFormModal onClose={() => setIsAddModalOpen(false)} onSubmit={handleAddItem} title="Add Obligation" />
              )}

              {editingItem && (
                <ObligationFormModal initialData={editingItem} onClose={() => setEditingItem(null)} onSubmit={handleUpdateItem} title="Edit Obligation" />
              )}

              <ItemDetailsModal 
                item={items.find(i => i.id === selectedItemId)} 
                onClose={() => setSelectedItemId(null)} 
                onPay={handlePay} 
                onUndo={handleUndo} 
                currentMonthStr={currentMonthStr} 
              />
              
              <Toast visible={toast.visible} message={toast.message} />
            </div>
          );
        }

        // --- Sub Components ---
        function ObligationCard({ item, onPay, onUndo, currentMonthStr, onSelect, onEdit }) {
          const [translateX, setTranslateX] = useState(0);
          const touchStartX = useRef(null);
          const touchStartY = useRef(null);
          const isHorizontalSwipe = useRef(null);

          const isLoan = item.type === 'installment';
          const itemNextMonth = item.nextPaymentMonth || currentMonthStr;
          const isPaid = itemNextMonth > currentMonthStr;

          const currentInst = item.currentInstallment || 1;
          const remainingInstallments = isLoan ? item.totalInstallments - currentInst + 1 : 0;
          const remainingBalance = isLoan ? (item.amount * remainingInstallments) : item.amount;
          const progress = isLoan ? ((currentInst - 1) / item.totalInstallments) * 100 : 0;

          const handleTouchStart = (e) => {
            touchStartX.current = e.touches[0].clientX;
            touchStartY.current = e.touches[0].clientY;
            isHorizontalSwipe.current = null;
          };

          const handleTouchMove = (e) => {
            if (touchStartX.current === null) return;
            const currentX = e.touches[0].clientX;
            const currentY = e.touches[0].clientY;
            const diffX = currentX - touchStartX.current;
            const diffY = currentY - touchStartY.current;

            if (isHorizontalSwipe.current === null) {
              isHorizontalSwipe.current = Math.abs(diffX) > Math.abs(diffY);
            }

            if (isHorizontalSwipe.current) {
              if (diffX < 0 && diffX >= -80) {
                setTranslateX(diffX);
              } else if (diffX > 0 && translateX < 0) {
                setTranslateX(Math.min(0, translateX + diffX));
              }
            }
          };

          const handleTouchEnd = () => {
            if (translateX < -40) {
              setTranslateX(-80);
            } else {
              setTranslateX(0);
            }
            touchStartX.current = null;
            touchStartY.current = null;
            isHorizontalSwipe.current = null;
          };

          const handleCardClick = () => {
            if (translateX < 0) {
              setTranslateX(0);
              return;
            }
            onSelect(item.id);
          };

          return (
            <div className="relative rounded-2xl mb-3 overflow-hidden">
              <div className="absolute inset-y-0 right-0 flex items-center justify-end w-1/2 pr-4 bg-gray-100 rounded-2xl">
                <button 
                  onClick={(e) => { e.stopPropagation(); onEdit(item); setTranslateX(0); }}
                  className="w-12 h-12 flex items-center justify-center bg-white text-blue-600 rounded-full shadow-sm hover:bg-blue-50 transition-colors active:scale-95"
                >
                  <Edit2 size={20} />
                </button>
              </div>

              <div 
                onTouchStart={handleTouchStart}
                onTouchMove={handleTouchMove}
                onTouchEnd={handleTouchEnd}
                onClick={handleCardClick}
                className={`relative p-4 rounded-2xl border transition-transform duration-200 cursor-pointer ${isPaid ? 'bg-gray-50 border-gray-100' : 'bg-white border-gray-200 shadow-sm'}`}
                style={{ transform: `translateX(${translateX}px)` }}
              >
                <div className="flex justify-between items-start pointer-events-none">
                  <div className="flex items-start space-x-3">
                    <div className={`p-2 rounded-xl mt-1 ${isLoan ? 'bg-purple-100 text-purple-600' : 'bg-green-100 text-green-600'}`}>
                      {isLoan ? <TrendingUp size={20} /> : <CreditCard size={20} />}
                    </div>
                    <div>
                      <h4 className={`font-semibold text-[16px] ${isPaid ? 'text-gray-500 line-through decoration-gray-300' : 'text-gray-900'}`}>
                        {item.name}
                      </h4>
                      <div className="text-sm font-medium text-gray-500 mb-1">
                        Bal: ₱{remainingBalance.toLocaleString()}
                      </div>
                      <div className="flex items-center text-xs text-gray-400 space-x-2">
                        <span className="flex items-center bg-gray-100 px-1.5 py-0.5 rounded text-gray-500">
                          <Calendar size={12} className="mr-1" /> Day {item.originalDueDate}
                        </span>
                        {isLoan && (
                          <span className="bg-purple-50 text-purple-600 px-1.5 py-0.5 rounded font-medium">
                            {currentInst}/{item.totalInstallments}
                          </span>
                        )}
                      </div>
                    </div>
                  </div>
                  
                  <div className="text-right flex flex-col items-end pointer-events-auto">
                    <span className={`font-bold mb-3 ${isPaid ? 'text-gray-400' : 'text-gray-900'}`}>
                      ₱{item.amount.toLocaleString()}
                    </span>
                    <div className="flex items-center space-x-2">
                      {isPaid && (
                        <button 
                          onClick={(e) => { e.stopPropagation(); onUndo(item.id); }}
                          className="p-1.5 rounded-full bg-gray-200 text-gray-600 hover:bg-gray-300 active:scale-95 transition-all"
                          title="Undo last payment"
                        >
                          <RotateCcw size={16} />
                        </button>
                      )}
                      <button 
                        onClick={(e) => { e.stopPropagation(); onPay(item.id); }}
                        className={`flex items-center px-3 py-1.5 rounded-full text-sm font-medium transition-all active:scale-95 ${
                          isPaid 
                            ? 'bg-blue-100 text-blue-700 hover:bg-blue-200' 
                            : 'bg-gray-900 text-white hover:bg-gray-800'
                        }`}
                      >
                        {isPaid ? (
                          <><FastForward size={14} className="mr-1" /> Advance</>
                        ) : (
                          <><CheckCircle2 size={14} className="mr-1" /> Pay</>
                        )}
                      </button>
                    </div>
                  </div>
                </div>
                
                {isLoan && (
                  <div className="mt-4 pointer-events-none">
                    <div className="w-full bg-gray-100 rounded-full h-1.5">
                      <div 
                        className={`h-1.5 rounded-full transition-all duration-500 ${isPaid ? 'bg-gray-400' : 'bg-purple-500'}`}
                        style={{ width: `${progress}%` }}
                      ></div>
                    </div>
                  </div>
                )}
              </div>
            </div>
          );
        }

        function ObligationFormModal({ initialData, onClose, onSubmit, title }) {
          const [formData, setFormData] = useState(initialData ? {
            name: initialData.name,
            type: initialData.type,
            amount: String(initialData.amount),
            originalDueDate: String(initialData.originalDueDate),
            currentInstallment: String(initialData.currentInstallment || '1'),
            totalInstallments: String(initialData.totalInstallments || '')
          } : {
            name: '',
            type: 'recurring',
            amount: '',
            originalDueDate: '',
            currentInstallment: '1',
            totalInstallments: ''
          });

          const handleSubmit = (e) => {
            e.preventDefault();
            onSubmit(formData);
          };

          return (
            <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-gray-900/60 backdrop-blur-sm p-0 sm:p-4 transition-opacity">
              <div className="bg-white w-full max-w-md rounded-t-3xl sm:rounded-3xl p-6 shadow-2xl animate-in slide-in-from-bottom-10 sm:slide-in-from-bottom-0 sm:zoom-in-95 duration-200">
                <div className="flex justify-between items-center mb-6">
                  <h2 className="text-xl font-bold text-gray-900">{title}</h2>
                  <button onClick={onClose} className="p-2 bg-gray-100 rounded-full text-gray-600 active:bg-gray-200">
                    <X size={20} />
                  </button>
                </div>

                <form onSubmit={handleSubmit} className="space-y-5">
                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-1">Name (e.g. GLoan, Netflix)</label>
                    <input 
                      required
                      type="text" 
                      className="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-[16px] text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-500"
                      value={formData.name}
                      onChange={(e) => setFormData({...formData, name: e.target.value})}
                      placeholder="Obligation Name"
                    />
                  </div>

                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="block text-sm font-medium text-gray-700 mb-1">Monthly Amount</label>
                      <input 
                        required
                        type="number" 
                        min="1"
                        className="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-[16px] text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-500"
                        value={formData.amount}
                        onChange={(e) => setFormData({...formData, amount: e.target.value})}
                        placeholder="₱ 0.00"
                      />
                    </div>
                    <div>
                      <label className="block text-sm font-medium text-gray-700 mb-1">Original Due Date</label>
                      <input 
                        required
                        type="number" 
                        min="1" 
                        max="31"
                        className="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-[16px] text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-500"
                        value={formData.originalDueDate}
                        onChange={(e) => setFormData({...formData, originalDueDate: e.target.value})}
                        placeholder="Day (1-31)"
                      />
                    </div>
                  </div>

                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-2">Type</label>
                    <div className="flex bg-gray-100 p-1 rounded-xl">
                      <button
                        type="button"
                        className={`flex-1 py-2 text-sm font-medium rounded-lg transition-colors ${formData.type === 'recurring' ? 'bg-white shadow-sm text-gray-900' : 'text-gray-500'}`}
                        onClick={() => setFormData({...formData, type: 'recurring'})}
                        disabled={!!initialData}
                      >
                        Recurring / Sub
                      </button>
                      <button
                        type="button"
                        className={`flex-1 py-2 text-sm font-medium rounded-lg transition-colors ${formData.type === 'installment' ? 'bg-white shadow-sm text-gray-900' : 'text-gray-500'}`}
                        onClick={() => setFormData({...formData, type: 'installment'})}
                        disabled={!!initialData}
                      >
                        Installment Loan
                      </button>
                    </div>
                  </div>

                  {formData.type === 'installment' && (
                    <div className="grid grid-cols-2 gap-4 animate-in fade-in zoom-in duration-200">
                       <div>
                        <label className="block text-sm font-medium text-gray-700 mb-1">Current Month</label>
                        <input 
                          required
                          type="number" 
                          min="1"
                          className="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-[16px] text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-500"
                          value={formData.currentInstallment}
                          onChange={(e) => setFormData({...formData, currentInstallment: e.target.value})}
                        />
                      </div>
                      <div>
                        <label className="block text-sm font-medium text-gray-700 mb-1">Total Months</label>
                        <input 
                          required
                          type="number" 
                          min="1"
                          className="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-[16px] text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-500"
                          value={formData.totalInstallments}
                          onChange={(e) => setFormData({...formData, totalInstallments: e.target.value})}
                          placeholder="e.g. 10"
                        />
                      </div>
                    </div>
                  )}

                  <div className="bg-blue-50 p-4 rounded-xl flex items-start mt-4">
                    <Bell size={18} className="text-blue-600 mt-0.5 mr-3 flex-shrink-0" />
                    <p className="text-sm text-blue-800">
                      {formData.originalDueDate ? (
                        <>Based on day {formData.originalDueDate}, this will be assigned to the <span className="font-bold">{getSettlementDate(Number(formData.originalDueDate))}th</span> settlement batch.</>
                      ) : (
                        <>Enter a due date to see which batch it belongs to.</>
                      )}
                    </p>
                  </div>

                  <button 
                    type="submit"
                    className="w-full bg-gray-900 text-white font-medium py-3.5 rounded-xl mt-6 active:bg-gray-800 transition-colors"
                  >
                    {initialData ? 'Save Changes' : 'Add to DebtBoard'}
                  </button>
                </form>
              </div>
            </div>
          );
        }

        function Toast({ visible, message }) {
          if (!visible) return null;
          return (
            <div className="fixed top-4 left-0 right-0 z-50 flex justify-center px-4 pointer-events-none animate-in slide-in-from-top-5 fade-in duration-300">
              <div className="bg-gray-900 text-white px-6 py-3 rounded-full shadow-lg flex items-center space-x-2 text-sm font-medium">
                <CheckCircle2 size={16} className="text-green-400" />
                <span>{message}</span>
              </div>
            </div>
          );
        }

        function ItemDetailsModal({ item, onClose, onPay, onUndo, currentMonthStr }) {
          if (!item) return null;
          const isLoan = item.type === 'installment';
          const currentYear = new Date().getFullYear();

          const rows = [];

          if (isLoan) {
            for (let i = 1; i <= item.totalInstallments; i++) {
              const monthOffset = i - (item.currentInstallment || 1);
              const estMonthStr = addMonthsStr(item.nextPaymentMonth || currentMonthStr, monthOffset);
              rows.push({
                key: `inst-${i}`,
                label: `Installment ${i} of ${item.totalInstallments}`,
                subLabel: formatMonthStr(estMonthStr),
                isPaid: i < item.currentInstallment,
                isDue: i === item.currentInstallment,
                canUndo: i === (item.currentInstallment - 1),
              });
            }
          } else {
            for (let i = 1; i <= 12; i++) {
              const monthStr = `${currentYear}-${String(i).padStart(2, '0')}`;
              const nextPay = item.nextPaymentMonth || currentMonthStr;
              rows.push({
                key: monthStr,
                label: formatMonthStr(monthStr),
                subLabel: 'Monthly Due',
                isPaid: monthStr < nextPay,
                isDue: monthStr === nextPay,
                canUndo: monthStr === addMonthsStr(nextPay, -1),
              });
            }
          }

          return (
            <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-gray-900/60 backdrop-blur-sm p-0 sm:p-4 transition-opacity">
              <div className="bg-white w-full max-w-md rounded-t-3xl sm:rounded-3xl p-6 shadow-2xl animate-in slide-in-from-bottom-10 sm:slide-in-from-bottom-0 sm:zoom-in-95 duration-200 max-h-[85vh] flex flex-col">
                <div className="flex justify-between items-start mb-6 shrink-0">
                  <div>
                    <h2 className="text-xl font-bold text-gray-900">{item.name}</h2>
                    <p className="text-sm text-gray-500 mt-1">Payment Schedule</p>
                  </div>
                  <button onClick={onClose} className="p-2 bg-gray-100 rounded-full text-gray-600 active:bg-gray-200">
                    <X size={20} />
                  </button>
                </div>

                <div className="overflow-y-auto pr-2 space-y-3 pb-4">
                  {rows.map(row => (
                    <div key={row.key} className={`flex items-center justify-between p-3 rounded-xl border transition-all ${row.isPaid ? 'bg-green-50 border-green-100' : row.isDue ? 'bg-blue-50 border-blue-200 shadow-sm' : 'bg-gray-50 border-gray-100 opacity-70'}`}>
                      <div>
                        <p className={`font-semibold text-sm ${row.isPaid ? 'text-green-800 line-through decoration-green-300' : row.isDue ? 'text-blue-900' : 'text-gray-500'}`}>{row.label}</p>
                        <p className={`text-xs mt-0.5 ${row.isPaid ? 'text-green-600' : row.isDue ? 'text-blue-600' : 'text-gray-400'}`}>{row.subLabel}</p>
                      </div>
                      
                      {row.isPaid ? (
                        <button 
                          onClick={() => row.canUndo && onUndo(item.id)}
                          className={`p-2 rounded-full ${row.canUndo ? 'text-green-600 hover:bg-green-200 cursor-pointer active:scale-95 transition-all' : 'text-green-400 cursor-default'}`}
                          disabled={!row.canUndo}
                          title={row.canUndo ? "Undo payment" : "Paid"}
                        >
                          <CheckCircle2 size={24} className={row.canUndo ? "fill-green-100" : ""} />
                        </button>
                      ) : row.isDue ? (
                        <button 
                          onClick={() => onPay(item.id)}
                          className="p-2 rounded-full text-blue-600 hover:bg-blue-200 cursor-pointer active:scale-95 transition-all"
                          title="Mark as paid"
                        >
                          <Circle size={24} />
                        </button>
                      ) : (
                        <div className="p-2 text-gray-300">
                          <Circle size={24} />
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then(registration => {
              console.log('ServiceWorker registration successful with scope: ', registration.scope);
            })
            .catch(error => {
              console.log('ServiceWorker registration failed: ', error);
            });
        });
      }
    </script>
</body>
</html>
